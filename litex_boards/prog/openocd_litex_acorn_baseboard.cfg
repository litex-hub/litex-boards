# OpenOCD config for LiteX Acorn Baseboard (Xilinx 7-Series + Lattice ECP5 chain).

adapter driver ftdi
adapter speed 2500
transport select jtag
ftdi vid_pid 0x0403 0x6010
ftdi channel 0
ftdi layout_init 0xfff8 0xfffb
reset_config none

source [find cpld/xilinx-xc7.cfg]
source [find fpga/lattice_ecp5.cfg]
