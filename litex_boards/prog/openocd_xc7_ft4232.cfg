# OpenOCD config for generic Xilinx 7-Series boards via FT4232H (channel A).

interface ftdi
adapter speed 25000
transport select jtag
ftdi_vid_pid 0x0403 0x6011
ftdi_channel 0
ftdi_layout_init 0x00e8 0x60eb
reset_config none

source [find cpld/xilinx-xc7.cfg]
source [find cpld/jtagspi.cfg]

proc fpga_program {} {
    global _CHIPNAME
    xc7_program $_CHIPNAME.tap
}
