# OpenOCD config for Efinix Titanium dev kits via on-board FT4232H
# (intended for litex_server / JTAG bridge use, not bitstream loading).

adapter driver ftdi
adapter speed 3000
transport select jtag
ftdi vid_pid 0x0403 0x6011
ftdi channel 1
ftdi layout_init 0x00e8 0x60eb
reset_config none

set _CHIPNAME titanium
jtag newtap $_CHIPNAME tap -irlen 5 -ignore-version -expected-id 0x10660a79

set JTAGSPI_IR 0x08
source [find cpld/jtagspi.cfg]
