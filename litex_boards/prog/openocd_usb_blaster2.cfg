# OpenOCD config for generic Intel/Altera USB-Blaster II.
# Override the chip via -c "set CHIPNAME <name>" or pass an irlen-correct
# replacement for non-MAX10 50K parts.

source [find interface/altera-usb-blaster2.cfg]
transport select jtag

if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME 10m50
}

jtag newtap $_CHIPNAME tap -irlen 10
