# OpenOCD config for Xilinx Kintex UltraScale+ XCKU3P via FT232H.
# UltraScale+ support in OpenOCD requires the CHIP variable to be set
# (e.g. -c "set CHIP XCKU3P").

adapter driver ftdi
adapter speed 25000
transport select jtag
ftdi vid_pid 0x0403 0x6014
ftdi channel 0
ftdi layout_init 0x00e8 0x60eb
reset_config none

set CHIP XCKU3P

source [find cpld/xilinx-xcu.cfg]
source [find cpld/jtagspi.cfg]

proc fpga_program {} {
    global _CHIPNAME
    xcu_program $_CHIPNAME.tap
}
